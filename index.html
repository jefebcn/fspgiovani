<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Federazione Basket Sammarinese - Sezione Giovani. Iscrizioni e attività per i più piccoli.">
<title>Federazione Basket Sammarinese · Sezione Giovani</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:#0d1f3c; --navy-l:#1a3560; --orange:#f47c20; --orange-l:#f9a55f;
  --white:#fff; --off:#f8f9fc; --gray:#6b7280; --lgray:#e5e7eb;
  --success:#16a34a; --err:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;color:var(--navy);background:var(--off);min-height:100vh;display:flex;flex-direction:column}
#app{flex:1}
a{text-decoration:none;color:inherit}

/* NAV */
nav{background:var(--navy);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35);gap:16px;transition:transform .3s ease}
nav.nav-hidden{transform:translateY(-100%)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;padding:13px 0;flex-shrink:0}
.nav-logo-ball{width:36px;height:36px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-logo-text{font-family:'Oswald',sans-serif;color:#fff;font-size:15px;font-weight:700;line-height:1.2}
.nav-logo-sub{color:var(--orange);font-size:10px;font-weight:400;letter-spacing:1px}
.nav-links{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
.nav-link{color:rgba(255,255,255,.72);font-size:13px;font-weight:600;padding:7px 10px;border-radius:6px;cursor:pointer;transition:color .15s,background .15s}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-link.active{color:var(--orange)}
/* HAMBURGER */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;margin-left:auto;z-index:101}
.hamburger span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px;transition:transform .3s ease,opacity .3s ease}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}

/* MOBILE MENU */
.mobile-menu{display:none;flex-direction:column;background:var(--navy);position:absolute;top:100%;left:0;right:0;padding:12px 24px 20px;box-shadow:0 8px 24px rgba(0,0,0,.4);gap:4px;max-height:0;overflow-y:auto;transition:max-height .35s ease,padding .35s ease}
.mobile-menu.open{max-height:calc(100vh - 64px);padding:12px 24px 20px}
.mobile-menu .nav-link{display:block;padding:12px 10px;font-size:15px;border-bottom:1px solid rgba(255,255,255,.06)}
.mobile-menu .nav-link:last-child{border-bottom:none}

@media(max-width:720px){
  .hamburger{display:flex}
  .mobile-menu{display:flex;max-height:0;padding:0 24px}
}

/* HERO */
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 55%,#2a4a7f 100%);padding:60px 24px 52px;text-align:center;overflow:hidden;position:relative}
.hero-bg1,.hero-bg2{position:absolute;border-radius:50%;background:rgba(244,124,32,.07);pointer-events:none}
.hero-bg1{width:320px;height:320px;top:-80px;right:-60px}
.hero-bg2{width:220px;height:220px;bottom:-50px;left:20px}
.hero-inner{position:relative;z-index:1}
.hero-kicker{font-family:'Oswald',sans-serif;color:var(--orange);font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.hero-title{font-family:'Oswald',sans-serif;color:#fff;font-size:54px;font-weight:700;line-height:1.05;margin-bottom:16px}
.hero-desc{color:rgba(255,255,255,.7);font-size:16px;max-width:500px;margin:0 auto 36px;line-height:1.7}

/* GALLERY (carousel with peek) */
.gallery{position:relative;width:100%;max-width:1200px;margin:0 auto;padding:0 60px;outline:none;box-sizing:border-box}
.gallery-viewport{overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none}
.gallery-viewport.dragging{cursor:grabbing}
.gallery-track{display:flex;transition:transform .65s cubic-bezier(.4,0,.2,1);will-change:transform}
.gallery-track.no-anim{transition:none}
.gallery-item{flex:0 0 43%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#0a1730;border:2px solid rgba(244,124,32,.25);display:flex;align-items:center;justify-content:center;margin:0 6px;box-sizing:border-box;box-shadow:0 8px 24px rgba(0,0,0,.3);position:relative}
.gallery-item img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block;opacity:0;transition:opacity .3s ease}
.gallery-item.loaded img{opacity:1}
.gallery-item-empty{color:rgba(255,255,255,.22);font-size:48px}
.gallery-item-placeholder{position:absolute;inset:0;background:linear-gradient(90deg,#0a1730 0%,#1a3560 50%,#0a1730 100%);background-size:200% 100%;animation:gallery-shimmer 1.4s linear infinite;pointer-events:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:28px}
.gallery-item.loaded .gallery-item-placeholder{display:none}
@keyframes gallery-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.gallery-btn{position:absolute;top:calc(50% - 10px);transform:translateY(-50%);background:rgba(13,31,60,.82);color:#fff;border:none;width:46px;height:46px;border-radius:50%;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.gallery-btn:hover{background:rgba(244,124,32,.9)}
.gallery-btn-prev{left:4px}
.gallery-btn-next{right:4px}
.gallery-dots{display:flex;justify-content:center;gap:8px}
.gallery-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:background .2s,transform .2s}
.gallery-dot.active{background:var(--orange);transform:scale(1.3)}
.gallery-item-clickable{cursor:zoom-in}
.gallery-controls{display:flex;justify-content:center;align-items:center;gap:18px;margin-top:18px}
.gallery-btn-b{display:none;background:rgba(13,31,60,.82);color:#fff;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:22px;align-items:center;justify-content:center;transition:background .15s}
.gallery-btn-b:hover{background:rgba(244,124,32,.9)}
@media(max-width:900px){
  .gallery-item{flex:0 0 60%}
}
@media(max-width:720px){
  .gallery{padding:0 10px}
  .gallery-btn-prev,.gallery-btn-next{display:none}
  .gallery-btn-b{display:flex}
  .gallery-controls{margin-top:14px}
}
@media(max-width:560px){
  .gallery-item{flex:0 0 80%}
}
@media(max-width:480px){
  .gallery{padding:0 6px}
}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;display:flex;align-items:center;justify-content:center;animation:lb-fade .2s ease;cursor:zoom-out;padding:20px}
@keyframes lb-fade{from{opacity:0}to{opacity:1}}
.lightbox-img{max-width:92vw;max-height:88vh;object-fit:contain;cursor:default;user-select:none;-webkit-user-select:none;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lightbox-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.1);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2}
.lightbox-close:hover{background:rgba(244,124,32,.9)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:54px;height:54px;border-radius:50%;font-size:30px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2}
.lightbox-nav:hover{background:rgba(244,124,32,.9)}
.lightbox-prev{left:22px}
.lightbox-next{right:22px}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:13px;letter-spacing:1px}
@media(max-width:720px){
  .lightbox-nav{width:42px;height:42px;font-size:22px}
  .lightbox-close{width:38px;height:38px;font-size:22px;top:10px;right:10px}
  .lightbox-prev{left:8px}
  .lightbox-next{right:8px}
}

/* SECTION */
.section{max-width:980px;margin:0 auto;padding:52px 24px}
.section-title{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--navy);margin-bottom:6px}
.section-line{width:48px;height:4px;background:var(--orange);border-radius:2px;margin-bottom:32px}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.cat-card{background:#fff;border-radius:14px;padding:28px 24px;border:1.5px solid var(--lgray);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:10px}
.cat-card:hover{border-color:var(--orange);transform:translateY(-3px);box-shadow:0 8px 24px rgba(244,124,32,.14)}
.cat-icon{font-size:28px}
.cat-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600}
.cat-desc{font-size:14px;color:var(--gray);line-height:1.5}
.cat-arrow{color:var(--orange);font-size:18px;font-weight:700;margin-top:auto}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-size:14px;color:var(--gray)}
.bc-link{color:var(--orange);cursor:pointer;font-weight:600}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.page-title{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--gray);font-size:15px;margin-bottom:32px}

/* CARD */
.card{background:#fff;border-radius:14px;padding:28px;border:1.5px solid var(--lgray)}
.card-title{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}

/* FLYER */
.flyer-box{background:linear-gradient(145deg,var(--navy),var(--navy-l));border-radius:10px;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center;gap:10px;overflow:hidden;position:relative}
.flyer-box:has(img){aspect-ratio:auto;padding:0}
.flyer-box img{width:100%;height:auto;display:block;border-radius:10px}
.flyer-ph{display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1}
.flyer-ph-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700}
.flyer-ph-note{font-size:12px;color:rgba(255,255,255,.4);margin-top:8px}

/* BUTTONS */
.btn{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#e06b10;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-navy{background:var(--navy-l)}
.btn-navy:hover{background:var(--navy)}
.btn-outline{background:transparent;color:var(--navy);border:2px solid var(--lgray);border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.btn-outline:hover{border-color:var(--navy)}
.btn-danger{background:#fef2f2;color:var(--err);border:1.5px solid #fca5a5;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.btn-danger:hover{background:#fee2e2}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 14px;font-size:12px}

/* FORM */
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
label.lbl{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px;display:block}
.req{color:var(--orange)}
input[type=text],input[type=email],input[type=tel],input[type=password],textarea,select{
  width:100%;padding:10px 14px;border:1.5px solid var(--lgray);border-radius:8px;font-size:14px;
  font-family:'Nunito',sans-serif;color:var(--navy);background:#fff;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{margin-bottom:16px;width:100%;max-width:100%;overflow:hidden;box-sizing:border-box}
.file-drop{border:2px dashed var(--lgray);border-radius:8px;padding:20px 16px;text-align:center;cursor:pointer;background:var(--off);transition:all .15s;user-select:none;-webkit-user-select:none;width:100%;max-width:100%;overflow:hidden;box-sizing:border-box;min-width:0}
.file-drop:hover,.file-drop.drag{border-color:var(--orange);background:#fff8f2}
.file-drop-icon{font-size:22px;margin-bottom:6px}
.file-drop-text{font-size:14px;color:var(--gray)}
.file-drop-hint{font-size:12px;color:var(--gray);margin-top:4px}
.file-name{color:var(--success);font-weight:700;font-size:14px;margin-bottom:4px}
.file-meta{font-size:12px;color:var(--gray)}

/* ALERTS */
.alert{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:14px;line-height:1.5}
.alert-err{background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b}
.alert-ok{background:#f0fdf4;border:1.5px solid #86efac;color:#166534}
.success-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:32px 28px;text-align:center}
.success-icon{font-size:44px;margin-bottom:12px}
.success-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--success);margin-bottom:8px}
.success-text{color:#166534;font-size:15px;margin-bottom:20px;line-height:1.6}

/* ADMIN */
.admin-wrap{max-width:400px;margin:80px auto;padding:0 24px}
.admin-card{background:#fff;border-radius:16px;padding:40px 36px;border:1.5px solid var(--lgray);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.admin-icon{font-size:36px;margin-bottom:10px;display:block;text-align:center}
.admin-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}
.admin-sub{font-size:14px;color:var(--gray);text-align:center;margin-bottom:28px}
.dash-wrap{max-width:1100px;margin:0 auto;padding:44px 24px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.dash-title{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700}
.dash-actions{display:flex;gap:10px;flex-wrap:wrap}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:12px;padding:20px 24px;border:1.5px solid var(--lgray)}
.stat-label{font-size:13px;color:var(--gray);margin-bottom:8px}
.stat-val{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--lgray);margin-bottom:28px}
.tab{padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;color:var(--gray);transition:all .15s;border:none;background:transparent;font-family:'Nunito',sans-serif}
.tab.active{color:var(--navy);background:#fff;border:2px solid var(--lgray);border-bottom:2px solid #fff;margin-bottom:-2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 14px;background:var(--navy);color:#fff;font-size:13px;font-weight:600}
th:first-child{border-radius:8px 0 0 0}
th:last-child{border-radius:0 8px 0 0}
td{padding:11px 14px;border-bottom:1px solid var(--lgray);vertical-align:middle}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:var(--orange);color:#fff}
.badge-gray{background:var(--lgray);color:var(--gray)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-item{background:var(--off);border-radius:8px;padding:12px 16px}
.detail-key{font-size:12px;color:var(--gray);margin-bottom:4px}
.detail-val{font-size:15px;font-weight:600}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}
.empty-state{text-align:center;padding:60px 0;color:var(--gray)}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--navy)}
.empty-text{font-size:14px}

/* CONTENT UPLOAD (admin) */
.asset-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--lgray);gap:12px;flex-wrap:wrap}
.asset-row:last-child{border-bottom:none}
.asset-cat{font-weight:700;font-size:14px}
.asset-slots{display:flex;gap:10px;flex-wrap:wrap}
.asset-slot{display:flex;align-items:center;gap:8px;background:var(--off);border-radius:8px;padding:8px 14px;font-size:13px}
.asset-slot-ok{background:#f0fdf4;border:1px solid #86efac}
.asset-slot-miss{border:1.5px dashed var(--lgray)}

/* LOADING */
.loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.loader-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--navy)}
@keyframes spin{to{transform:rotate(360deg)}}
.page-loader{text-align:center;padding:80px 24px;color:var(--gray);font-size:15px}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-msg{background:var(--navy);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;max-width:300px}
.toast-msg.show{opacity:1;transform:translateY(0)}
.toast-msg.ok{background:#166534}
.toast-msg.err{background:#991b1b}

/* FOOTER */
footer{background:var(--navy);color:rgba(255,255,255,.45);text-align:center;padding:24px 16px;font-size:13px;margin-top:auto;word-break:break-word;overflow-wrap:break-word}
footer span{color:rgba(255,255,255,.25);font-size:12px;display:block;margin-top:5px}

/* RESPONSIVE */
@media(max-width:720px){
  .hero-title{font-size:38px}
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
  .nav-links{display:none}
  .hide-mobile{display:none}
}
@media(max-width:600px){
  .form-grid2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .hero-title{font-size:30px}
  .stats-row{grid-template-columns:1fr}
}
</style>
</head>

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });

function navUrl(page, catId) {
  if (page === 'admin') return '#admin';
  if (page === 'category' && catId) return '#category=' + encodeURIComponent(catId);
  return '#';
}
function applyRoute(fromPop) {
  const h = window.location.hash;
  let page = 'home', catId = null;
  if (h === '#admin') page = 'admin';
  else if (h.startsWith('#category=')) {
    const id = decodeURIComponent(h.slice('#category='.length));
    if (catById(id)) { page = 'category'; catId = id; }
  }
  // Reset pending files on every route change
  _pendingFiles.modulo = null;
  _pendingFiles.documento = null;
  _pendingFiles.certificato = null;
  Object.assign(state, { page, catId, formSuccess: false, selected: null });
  render();
  if (!fromPop) window.scrollTo(0, 0);
}
function navigate(page, catId = null) {
  // Reset pending files so switching category doesn't carry files over
  _pendingFiles.modulo = null;
  _pendingFiles.documento = null;
  _pendingFiles.certificato = null;
  const url = navUrl(page, catId);
  history.pushState({ page, catId }, '', url);
  set({ page, catId, formSuccess: false, selected: null });
  window.scrollTo(0, 0);
}

const _CAROUSEL = { idx: 2, drag: null, animating: false, count: 8, leftClones: 2, rightClones: 2 };
let _wasDragged = false;
const _LIGHTBOX = { photos: [], idx: 0 };

function getAllHeroSlots() {
  const out = [];
  for (let n = 1; n <= 8; n++) {
    out.push({ n, url: state.assets['__hero'+n]?.flyer_url || null });
  }
  return out;
}
function getUploadedPhotos() {
  return getAllHeroSlots().filter(p => p.url);
}

function handleSlideClick(n) {
  if (_wasDragged) { _wasDragged = false; return; }
  openLightbox(n);
}

function openLightbox(slideN) {
  const photos = getUploadedPhotos();
  const i = photos.findIndex(p => p.n === slideN);
  if (i < 0) return;
  _LIGHTBOX.photos = photos;
  _LIGHTBOX.idx = i;
  renderLightbox();
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (lb) lb.remove();
  document.body.style.overflow = '';
}

function lightboxNext() {
  if (!_LIGHTBOX.photos.length) return;
  _LIGHTBOX.idx = (_LIGHTBOX.idx + 1) % _LIGHTBOX.photos.length;
  updateLightboxImg();
}

function lightboxPrev() {
  if (!_LIGHTBOX.photos.length) return;
  _LIGHTBOX.idx = (_LIGHTBOX.idx - 1 + _LIGHTBOX.photos.length) % _LIGHTBOX.photos.length;
  updateLightboxImg();
}

function renderLightbox() {
  const existing = document.getElementById('lightbox');
  if (existing) existing.remove();
  const p = _LIGHTBOX.photos[_LIGHTBOX.idx];
  const multi = _LIGHTBOX.photos.length > 1;
  const html = `
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
      <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()" aria-label="Chiudi">×</button>
      ${multi ? `<button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation();lightboxPrev()" aria-label="Precedente">‹</button>` : ''}
      <img class="lightbox-img" id="lightbox-img" src="${p.url}" alt="foto ${p.n}" onclick="event.stopPropagation()">
      ${multi ? `<button class="lightbox-nav lightbox-next" onclick="event.stopPropagation();lightboxNext()" aria-label="Successiva">›</button>` : ''}
      ${multi ? `<div class="lightbox-counter" id="lightbox-counter">${_LIGHTBOX.idx+1} / ${_LIGHTBOX.photos.length}</div>` : ''}
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function updateLightboxImg() {
  const img = document.getElementById('lightbox-img');
  const ctr = document.getElementById('lightbox-counter');
  if (img) img.src = _LIGHTBOX.photos[_LIGHTBOX.idx].url;
  if (ctr) ctr.textContent = `${_LIGHTBOX.idx+1} / ${_LIGHTBOX.photos.length}`;
}

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox')) return;
  if (e.key === 'Escape') { e.preventDefault(); closeLightbox(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); lightboxPrev(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); lightboxNext(); }
});

function renderCarousel() {
  const N = _CAROUSEL.count;
  const LC = _CAROUSEL.leftClones;
  const RC = _CAROUSEL.rightClones;
  const raw = getAllHeroSlots().map(s => s.url);
  const slideHtml = (u, n) => u
    ? `<div class="gallery-item gallery-item-clickable" onclick="handleSlideClick(${n})"><div class="gallery-item-placeholder">📷</div><img src="${u}" alt="foto ${n}" draggable="false" loading="eager" decoding="async" onload="this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('loaded')"></div>`
    : `<div class="gallery-item"><span class="gallery-item-empty">📷</span></div>`;
  // Build: [left clones (LC of last items)] [real 1..N] [right clones (RC of first items)]
  const parts = [];
  for (let i = 0; i < LC; i++) {
    const srcIdx = ((N - LC + i) % N + N) % N;
    parts.push(slideHtml(raw[srcIdx], srcIdx + 1));
  }
  for (let i = 0; i < N; i++) parts.push(slideHtml(raw[i], i + 1));
  for (let i = 0; i < RC; i++) parts.push(slideHtml(raw[i], i + 1));
  const realIdx = ((_CAROUSEL.idx - LC) % N + N) % N;
  const dots = raw.map((_, i) =>
    `<button class="gallery-dot${i===realIdx?' active':''}" onclick="goSlide(${i+1})" aria-label="Vai alla foto ${i+1}"></button>`
  ).join('');
  return `
    <div class="gallery" id="gallery" tabindex="0">
      <button class="gallery-btn gallery-btn-prev" onclick="prevSlide()" aria-label="Precedente">‹</button>
      <div class="gallery-viewport" id="gallery-viewport">
        <div class="gallery-track" id="gallery-track">
          ${parts.join('')}
        </div>
      </div>
      <button class="gallery-btn gallery-btn-next" onclick="nextSlide()" aria-label="Successiva">›</button>
      <div class="gallery-controls">
        <button class="gallery-btn-b" onclick="prevSlide()" aria-label="Precedente">‹</button>
        <div class="gallery-dots">${dots}</div>
        <button class="gallery-btn-b" onclick="nextSlide()" aria-label="Successiva">›</button>
      </div>
    </div>`;
}

function getCarouselMetrics() {
  const track = document.getElementById('gallery-track');
  const vp = document.getElementById('gallery-viewport');
  if (!track || !vp) return null;
  const item = track.querySelector('.gallery-item');
  if (!item) return null;
  const st = getComputedStyle(item);
  const ml = parseFloat(st.marginLeft) || 0;
  const mr = parseFloat(st.marginRight) || 0;
  const step = item.offsetWidth + ml + mr;
  const vpW = vp.offsetWidth;
  const visible = Math.max(1, Math.floor(vpW / step));
  const peek = (vpW - visible * step) / 2;
  return { step, peek, vpW };
}

function setSlide(i, anim) {
  const track = document.getElementById('gallery-track');
  const m = getCarouselMetrics();
  if (!track || !m) return;
  _CAROUSEL.idx = i;
  track.classList.toggle('no-anim', !anim);
  const tx = m.peek - i * m.step;
  track.style.transform = `translateX(${tx}px)`;
}

function updateDots() {
  const N = _CAROUSEL.count;
  const LC = _CAROUSEL.leftClones;
  const real = ((_CAROUSEL.idx - LC) % N + N) % N;
  document.querySelectorAll('.gallery-dots').forEach(container => {
    container.querySelectorAll('.gallery-dot').forEach((d, i) => {
      d.classList.toggle('active', i === real);
    });
  });
}

function afterTransition(cb) {
  const track = document.getElementById('gallery-track');
  if (!track) { cb(); return; }
  let done = false;
  const finish = () => { if (done) return; done = true; track.removeEventListener('transitionend', finish); cb(); };
  track.addEventListener('transitionend', finish);
  // Fallback: if transitionend never fires (track removed, re-render, etc.)
  // release the animating lock after the transition duration + margin.
  setTimeout(finish, 600);
}

function goByDelta(delta) {
  const N = _CAROUSEL.count;
  const LC = _CAROUSEL.leftClones;
  const RC = _CAROUSEL.rightClones;
  if (_CAROUSEL.animating || delta === 0) return;
  _CAROUSEL.animating = true;
  // Clamp target to the full DOM range [0, LC+N+RC-1] so the animation
  // always lands on an existing slide. After the transition we silent-jump
  // back into the real range [LC, LC+N-1] if we ended on a clone.
  const maxIdx = LC + N + RC - 1;
  let target = _CAROUSEL.idx + delta;
  if (target < 0) target = 0;
  else if (target > maxIdx) target = maxIdx;
  setSlide(target, true);
  updateDots();
  afterTransition(() => {
    if (_CAROUSEL.idx < LC) setSlide(_CAROUSEL.idx + N, false);
    else if (_CAROUSEL.idx >= LC + N) setSlide(_CAROUSEL.idx - N, false);
    _CAROUSEL.animating = false;
  });
}

function nextSlide() { goByDelta(1); }
function prevSlide() { goByDelta(-1); }

function goSlide(realN) {
  if (_CAROUSEL.animating) return;
  // realN is 1-based real photo index (1..N) from the dot buttons
  setSlide(_CAROUSEL.leftClones + (realN - 1), true);
  updateDots();
}

function initCarousel() {
  const gal = document.getElementById('gallery');
  const vp = document.getElementById('gallery-viewport');
  const track = document.getElementById('gallery-track');
  if (!gal || !vp || !track) return;
  // Keep idx inside the real range after a re-render or mount
  const LC = _CAROUSEL.leftClones;
  const N = _CAROUSEL.count;
  if (_CAROUSEL.idx < LC || _CAROUSEL.idx >= LC + N) _CAROUSEL.idx = LC;
  // ensure position is correct (no anim on first render)
  setSlide(_CAROUSEL.idx, false);
  requestAnimationFrame(() => setSlide(_CAROUSEL.idx, false));
  // Images cached from <link rel=preload> fire 'load' before the handler
  // attaches — mark any already-complete imgs as loaded immediately.
  track.querySelectorAll('.gallery-item img').forEach((img) => {
    if (img.complete && img.naturalWidth > 0) img.parentElement.classList.add('loaded');
  });

  gal.onkeydown = (e) => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
  };

  const start = (x) => {
    if (_CAROUSEL.animating) return;
    _wasDragged = false;
    const m = getCarouselMetrics();
    if (!m) return;
    _CAROUSEL.drag = { x, startIdx: _CAROUSEL.idx, m };
    vp.classList.add('dragging');
    track.classList.add('no-anim');
  };
  const move = (x) => {
    if (!_CAROUSEL.drag) return;
    const dx = x - _CAROUSEL.drag.x;
    if (Math.abs(dx) > 5) _wasDragged = true;
    const m = _CAROUSEL.drag.m;
    const tx = m.peek - _CAROUSEL.drag.startIdx * m.step + dx;
    track.style.transform = `translateX(${tx}px)`;
  };
  const end = (x) => {
    if (!_CAROUSEL.drag) return;
    const dx = x - _CAROUSEL.drag.x;
    const step = _CAROUSEL.drag.m.step;
    vp.classList.remove('dragging');
    _CAROUSEL.drag = null;
    // Compute how many slides the drag covered (negative dx = forward)
    const delta = -Math.round(dx / step);
    // Small residual drag still counts as a single nav if above 20% threshold
    if (delta !== 0) goByDelta(delta);
    else if (Math.abs(dx) > step * 0.2) goByDelta(dx < 0 ? 1 : -1);
    else setSlide(_CAROUSEL.idx, true);
  };
  vp.onmousedown = (e) => { e.preventDefault(); start(e.clientX); };
  vp.ontouchstart = (e) => start(e.touches[0].clientX);
  vp.ontouchmove = (e) => move(e.touches[0].clientX);
  vp.ontouchend = (e) => end(e.changedTouches[0].clientX);
  // Use addEventListener on window so we don't clobber other handlers.
  // Bind once (guarded) to avoid piling listeners on each re-render.
  if (!window._galleryDragBound) {
    window._galleryDragBound = true;
    window.addEventListener('mousemove', (e) => { if (_CAROUSEL.drag) move(e.clientX); });
    window.addEventListener('mouseup', (e) => { if (_CAROUSEL.drag) end(e.clientX); });
  }

  if (!window._galleryResizeBound) {
    window._galleryResizeBound = true;
    window.addEventListener('resize', () => {
      if (document.getElementById('gallery-track')) setSlide(_CAROUSEL.idx, false);
    });
  }
}

function loadXLSX() {
  if (window.XLSX) return Promise.resolve();
  if (window._xlsxLoading) return window._xlsxLoading;
  window._xlsxLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.onload = resolve;
    s.onerror = () => { window._xlsxLoading = null; reject(new Error('xlsx load failed')); };
    document.head.appendChild(s);
  });
  return window._xlsxLoading;
}

async function exportExcel() {
  try { await loadXLSX(); }
  catch (e) { toast('Errore nel caricamento della libreria export', 'err'); return; }
  const subs = getFilteredSubs();
  const rows = subs.map(s => {
    const fp = parseFilePaths(s.file_path);
    const hasModulo = typeof fp === 'object' ? !!fp.modulo : !!fp;
    const hasDoc = typeof fp === 'object' ? !!fp.documento : false;
    const hasCert = typeof fp === 'object' ? !!fp.certificato : false;
    return {
      'Nome bambino': s.nome || '',
      'Cognome bambino': s.cognome || '',
      'Email genitore': s.email || '',
      'Categoria': s.category_name || '',
      'Data': fmtDate(s.created_at),
      'Modulo allegato': hasModulo ? 'Sì' : 'No',
      'Documento identità': hasDoc ? 'Sì' : 'No',
      'Certificato medico': hasCert ? 'Sì' : 'No',
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:18},{wch:28},{wch:22},{wch:14},{wch:16},{wch:20},{wch:18}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Iscrizioni');
  XLSX.writeFile(wb, `iscrizioni_${state.filterCat || 'tutte'}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

const _pendingFiles = { modulo: null, documento: null, certificato: null };
let _pendingAssetMeta = null; // {catId, kind}

function handleMultiSelect(e, key) {
  const f = e.target.files[0];
  if (f) { _pendingFiles[key] = f; updateMultiLabel(key, f); updateFileSummary(); }
}
function handleMultiDrop(e, key) {
  e.preventDefault();
  document.getElementById('file-drop-' + key)?.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) { _pendingFiles[key] = f; updateMultiLabel(key, f); updateFileSummary(); }
}
function truncName(name, max) {
  if (name.length <= max) return name;
  const dot = name.lastIndexOf('.');
  const ext = dot > 0 ? name.slice(dot) : '';
  const base = dot > 0 ? name.slice(0, dot) : name;
  const keep = max - ext.length - 3;
  return keep > 0 ? base.slice(0, keep) + '...' + ext : name.slice(0, max - 3) + '...';
}
function updateMultiLabel(key, f) {
  const el = document.getElementById('file-label-' + key);
  if (el) el.innerHTML = `<div class="file-name">✅ ${truncName(f.name, 25)}</div><div class="file-meta">${fmtSize(f.size)} · Clicca per cambiare</div>`;
}
function updateFileSummary() {
  const count = Object.values(_pendingFiles).filter(Boolean).length;
  const el = document.getElementById('file-summary');
  if (el) el.innerHTML = count > 0 ? `📎 Hai allegato <strong>${count}</strong> file su <strong>3</strong>` : '';
}

async function submitForm(catId) {
  const errEl = document.getElementById('form-err');
  const keys = ['modulo','documento','certificato'];

  const nome = document.getElementById('f-nome')?.value.trim();
  const cognome = document.getElementById('f-cognome')?.value.trim();
  const email = document.getElementById('f-email')?.value.trim();
  if (!nome || !cognome || !email) {
    errEl.innerHTML = `<div class="alert alert-err">⚠ Compila tutti i campi obbligatori (nome, cognome, email).</div>`;
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.innerHTML = `<div class="alert alert-err">⚠ Inserisci un indirizzo email valido.</div>`;
    return;
  }

  const labels = { modulo: 'Modulo compilato', documento: "Documento d'identità", certificato: 'Certificato medico' };
  const missing = keys.filter(k => !_pendingFiles[k]).map(k => labels[k]);
  if (missing.length) {
    errEl.innerHTML = `<div class="alert alert-err">⚠ Devi allegare tutti e 3 i file. Mancano: <strong>${missing.join(', ')}</strong>.</div>`;
    return;
  }

  for (const key of keys) {
    if (_pendingFiles[key] && _pendingFiles[key].size > 5*1024*1024) {
      errEl.innerHTML = `<div class="alert alert-err">⚠ Il file "${_pendingFiles[key].name}" è troppo grande (max 5 MB).</div>`;
      return;
    }
  }
  errEl.innerHTML = '';
  const btn = document.getElementById('submit-btn');
  if (btn) btn.innerHTML = '<span class="loader"></span> Invio in corso...';
  if (btn) btn.disabled = true;

  try {
    const ts = Date.now();
    const paths = {};
    const names = {};
    for (const key of keys) {
      const f = _pendingFiles[key];
      if (f) {
        const ext = f.name.split('.').pop();
        const path = `${catId}/${ts}_${key}.${ext}`;
        const { error: upErr } = await dbPublic.storage.from('submission-files').upload(path, f);
        if (upErr) throw upErr;
        paths[key] = path;
        names[key] = f.name;
      }
    }
    const hasFiles = Object.keys(paths).length > 0;
    const insertData = {
      category_id: catId,
      category_name: catById(catId)?.name || catId,
      nome,
      cognome,
      email,
      file_path: hasFiles ? JSON.stringify(paths) : null,
      file_name: hasFiles ? JSON.stringify(names) : null,
    };
    const { error } = await dbPublic.from('submissions').insert(insertData).select();
    if (error) throw error;
    _pendingFiles.modulo = null; _pendingFiles.documento = null; _pendingFiles.certificato = null;
    set({ formSuccess: true });
    toast('Iscrizione inviata con successo!', 'ok');
  } catch (e) {
    if (btn) { btn.innerHTML = '📤 Invia iscrizione'; btn.disabled = false; }
    errEl.innerHTML = `<div class="alert alert-err">⚠ Errore durante l'invio. Riprova tra qualche istante.</div>`;
    console.error('submitForm error:', e);
  }
}

async function doLogin() {

  if (btn) { btn.innerHTML = '<span class="loader"></span>'; btn.disabled = true; }

    if (btn) { btn.innerHTML = 'Accedi'; btn.disabled = false; }

}

async function refreshSubs(skipRender) {
  const { data, error } = await db.from('submissions').select('*').order('created_at', { ascending: false });
  if (!error) state.submissions = data || [];
  if (!skipRender) render();
}

function parseFilePaths(val) {
  if (!val) return null;
  try { const p = JSON.parse(val); return (typeof p === 'object' && p !== null) ? p : val; }
  catch { return val; }
}

async function downloadSubSingle(subId) {
  const s = state.submissions.find(x => x.id === subId);
  if (!s?.file_path) return;
  const fp = parseFilePaths(s.file_path);
  const fn = parseFilePaths(s.file_name);
  const path = typeof fp === 'string' ? fp : Object.values(fp)[0];
  const name = typeof fn === 'string' ? fn : Object.values(fn)[0];
  const { data, error } = await db.storage.from('submission-files').createSignedUrl(path, 120);
  if (error) { toast('Errore nel download', 'err'); return; }
  const a = document.createElement('a'); a.href = data.signedUrl; a.download = name || 'allegato'; a.click();
}

async function downloadSubByKey(subId, key) {
  const s = state.submissions.find(x => x.id === subId);
  if (!s?.file_path) return;
  const fp = parseFilePaths(s.file_path);
  const fn = parseFilePaths(s.file_name);
  const path = typeof fp === 'object' ? fp[key] : fp;
  const name = typeof fn === 'object' ? fn[key] : fn;
  if (!path) return;
  const { data, error } = await db.storage.from('submission-files').createSignedUrl(path, 120);
  if (error) { toast('Errore nel download', 'err'); return; }
  const a = document.createElement('a'); a.href = data.signedUrl; a.download = name || 'allegato'; a.click();
}

async function deleteSub(subId) {
  if (!confirm('Eliminare questa iscrizione? L\'operazione non è reversibile.')) return;
  const s = state.submissions.find(x => x.id === subId);
  const fp = parseFilePaths(s?.file_path);
  const filesToRemove = typeof fp === 'object' && fp ? Object.values(fp) : (fp ? [fp] : []);
  if (filesToRemove.length) {
    await db.storage.from('submission-files').remove(filesToRemove);
  }
  const { error } = await db.from('submissions').delete().eq('id', subId);
  if (error) { toast('Errore eliminazione', 'err'); return; }
  state.submissions = state.submissions.filter(x => x.id !== subId);
  set({ selected: null });
  toast('Iscrizione eliminata');
}

// ══════════════════════════════════════════════
// ADMIN — ASSET MANAGEMENT
// ══════════════════════════════════════════════
async function loadAssets() {
  const { data } = await db.from('category_assets').select('*');
  if (data) {
    state.assets = {};
    for (const row of data) {
      state.assets[row.category_id] = row;
      if (row.flyer_path) {
        const { data: urlData } = db.storage.from('category-assets').getPublicUrl(row.flyer_path);
        state.assets[row.category_id].flyer_url = urlData?.publicUrl;
      }
    }
  }
  // Inject <link rel="preload" as="image"> tags for each uploaded hero
  // photo so the browser starts downloading them with high priority
  // before the carousel mounts its <img> tags.
  preloadHeroPhotos();
}

function preloadHeroPhotos() {
  // Remove any previous preload link tags (e.g. after an upload)
  document.querySelectorAll('link[data-hero-preload]').forEach(l => l.remove());
  for (let n = 1; n <= 8; n++) {
    const url = state.assets['__hero'+n]?.flyer_url;
    if (!url) continue;
    const link = document.createElement('link');
    link.rel = 'preload';
    link.as = 'image';
    link.href = url;
    link.setAttribute('data-hero-preload', '');
    document.head.appendChild(link);
    console.log('[preload] <link rel=preload> hero', n);
  }
}

function triggerAsset(catId, kind) {
  _pendingAssetMeta = { catId, kind };
  const inp = document.getElementById('asset-inp');
  if (kind === 'flyer') inp.accept = 'image/*,.pdf';
  else inp.accept = '.docx,.doc';
  inp.value = '';
  inp.click();
}

async function handleAssetUpload(e) {
  const file = e.target.files[0];
  if (!file || !_pendingAssetMeta) return;
  const { catId, kind } = _pendingAssetMeta;

  if (file.size > 10*1024*1024) { toast('File troppo grande (max 10 MB)', 'err'); return; }

  const ext = file.name.split('.').pop();
  const path = `${catId}/${kind}.${ext}`;

  // Remove old file if exists
  const old = state.assets[catId];
  if (old) {
    const oldPath = kind === 'flyer' ? old.flyer_path : old.template_path;
    if (oldPath) await db.storage.from('category-assets').remove([oldPath]);
  }

  const { error: upErr } = await db.storage.from('category-assets').upload(path, file, { upsert: true });
  if (upErr) { toast('Errore upload: ' + upErr.message, 'err'); return; }

  const update = kind === 'flyer'
    ? { category_id: catId, flyer_path: path, flyer_name: file.name }
    : { category_id: catId, template_path: path, template_name: file.name };

  const { error } = await db.from('category_assets').upsert(update, { onConflict: 'category_id' });
  if (error) { toast('Errore salvataggio', 'err'); return; }

  toast(`${kind === 'flyer' ? 'Volantino' : 'Modulo'} caricato!`, 'ok');
  await loadAssets();
  render();
}

async function downloadTemplate(catId) {
  const a = state.assets[catId];
  if (!a?.template_path) return;
  const { data, error } = await db.storage.from('category-assets').createSignedUrl(a.template_path, 60);
  if (error) { toast('Errore nel download', 'err'); return; }
  const link = document.createElement('a');
  link.href = data.signedUrl;
  link.download = a.template_name || 'modulo.docx';
  link.click();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  const { data: { session } } = await db.auth.getSession();
  state.user = session?.user || null;
  await loadAssets();
  if (state.user) await refreshSubs(true);
  // Seed initial route from the URL hash so direct links work
  applyRoute(true);
  // Replace the empty entry so subsequent back button behaves naturally
  const h = window.location.hash;
  history.replaceState({ page: state.page, catId: state.catId }, '', h || '#');
}

window.addEventListener('popstate', () => applyRoute(true));

// ── NAVBAR HIDE/SHOW ON SCROLL ──
(function(){
  const nav = document.getElementById('navbar');
  let lastY = window.scrollY;
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y > lastY && y > 60) nav.classList.add('nav-hidden');
    else nav.classList.remove('nav-hidden');
    lastY = y;
  });
})();

init();
</script>
</body>
