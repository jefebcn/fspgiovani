<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federazione Basket Sammarinese · Sezione Giovani</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:#0d1f3c; --navy-l:#1a3560; --orange:#f47c20; --orange-l:#f9a55f;
  --white:#fff; --off:#f8f9fc; --gray:#6b7280; --lgray:#e5e7eb;
  --success:#16a34a; --err:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;color:var(--navy);background:var(--off);min-height:100vh}
a{text-decoration:none;color:inherit}

/* NAV */
nav{background:var(--navy);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.35);gap:16px;transition:transform .3s ease}
nav.nav-hidden{transform:translateY(-100%)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;padding:13px 0;flex-shrink:0}
.nav-logo-ball{width:36px;height:36px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-logo-text{font-family:'Oswald',sans-serif;color:#fff;font-size:15px;font-weight:700;line-height:1.2}
.nav-logo-sub{color:var(--orange);font-size:10px;font-weight:400;letter-spacing:1px}
.nav-links{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
.nav-link{color:rgba(255,255,255,.72);font-size:13px;font-weight:600;padding:7px 10px;border-radius:6px;cursor:pointer;transition:color .15s,background .15s}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-link.active{color:var(--orange)}
.nav-admin{color:rgba(255,255,255,.4);font-size:11px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.12);margin-left:8px}
.nav-admin:hover{color:var(--orange);border-color:rgba(244,124,32,.4)}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;margin-left:auto;z-index:101}
.hamburger span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px;transition:transform .3s ease,opacity .3s ease}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}

/* MOBILE MENU */
.mobile-menu{display:none;flex-direction:column;background:var(--navy);position:absolute;top:100%;left:0;right:0;padding:12px 24px 20px;box-shadow:0 8px 24px rgba(0,0,0,.4);gap:4px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
.mobile-menu.open{max-height:500px;padding:12px 24px 20px}
.mobile-menu .nav-link{display:block;padding:12px 10px;font-size:15px;border-bottom:1px solid rgba(255,255,255,.06)}
.mobile-menu .nav-link:last-child{border-bottom:none}

@media(max-width:720px){
  .hamburger{display:flex}
  .mobile-menu{display:flex;max-height:0;padding:0 24px}
}

/* HERO */
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 55%,#2a4a7f 100%);padding:60px 24px 52px;text-align:center;overflow:hidden;position:relative}
.hero-bg1,.hero-bg2{position:absolute;border-radius:50%;background:rgba(244,124,32,.07);pointer-events:none}
.hero-bg1{width:320px;height:320px;top:-80px;right:-60px}
.hero-bg2{width:220px;height:220px;bottom:-50px;left:20px}
.hero-inner{position:relative;z-index:1}
.hero-kicker{font-family:'Oswald',sans-serif;color:var(--orange);font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.hero-title{font-family:'Oswald',sans-serif;color:#fff;font-size:54px;font-weight:700;line-height:1.05;margin-bottom:16px}
.hero-desc{color:rgba(255,255,255,.7);font-size:16px;max-width:500px;margin:0 auto 36px;line-height:1.7}
.photos-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:680px;margin:0 auto}
.photo-slot{background:var(--navy-l);border-radius:12px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;border:2px solid rgba(244,124,32,.25);overflow:hidden}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-ph{color:rgba(255,255,255,.3);font-size:13px;text-align:center;padding:16px;line-height:1.6}

/* SECTION */
.section{max-width:980px;margin:0 auto;padding:52px 24px}
.section-title{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--navy);margin-bottom:6px}
.section-line{width:48px;height:4px;background:var(--orange);border-radius:2px;margin-bottom:32px}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.cat-card{background:#fff;border-radius:14px;padding:28px 24px;border:1.5px solid var(--lgray);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:10px}
.cat-card:hover{border-color:var(--orange);transform:translateY(-3px);box-shadow:0 8px 24px rgba(244,124,32,.14)}
.cat-icon{font-size:28px}
.cat-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600}
.cat-desc{font-size:14px;color:var(--gray);line-height:1.5}
.cat-arrow{color:var(--orange);font-size:18px;font-weight:700;margin-top:auto}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-size:14px;color:var(--gray)}
.bc-link{color:var(--orange);cursor:pointer;font-weight:600}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.page-title{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--gray);font-size:15px;margin-bottom:32px}

/* CARD */
.card{background:#fff;border-radius:14px;padding:28px;border:1.5px solid var(--lgray)}
.card-title{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}

/* FLYER */
.flyer-box{background:linear-gradient(145deg,var(--navy),var(--navy-l));border-radius:10px;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center;gap:10px;overflow:hidden;position:relative}
.flyer-box:has(img){aspect-ratio:auto;padding:0}
.flyer-box img{width:100%;height:auto;display:block;border-radius:10px}
.flyer-ph{display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1}
.flyer-ph-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700}
.flyer-ph-note{font-size:12px;color:rgba(255,255,255,.4);margin-top:8px}

/* BUTTONS */
.btn{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:#e06b10;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-navy{background:var(--navy-l)}
.btn-navy:hover{background:var(--navy)}
.btn-outline{background:transparent;color:var(--navy);border:2px solid var(--lgray);border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.btn-outline:hover{border-color:var(--navy)}
.btn-danger{background:#fef2f2;color:var(--err);border:1.5px solid #fca5a5;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.btn-danger:hover{background:#fee2e2}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 14px;font-size:12px}

/* FORM */
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
label.lbl{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px;display:block}
.req{color:var(--orange)}
input[type=text],input[type=email],input[type=tel],input[type=password],textarea,select{
  width:100%;padding:10px 14px;border:1.5px solid var(--lgray);border-radius:8px;font-size:14px;
  font-family:'Nunito',sans-serif;color:var(--navy);background:#fff;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--orange)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{margin-bottom:16px;width:100%;max-width:100%;overflow:hidden;box-sizing:border-box}
.file-drop{border:2px dashed var(--lgray);border-radius:8px;padding:20px 16px;text-align:center;cursor:pointer;background:var(--off);transition:all .15s;user-select:none;-webkit-user-select:none;width:100%;max-width:100%;overflow:hidden;box-sizing:border-box;min-width:0}
.file-drop:hover,.file-drop.drag{border-color:var(--orange);background:#fff8f2}
.file-drop-icon{font-size:22px;margin-bottom:6px}
.file-drop-text{font-size:14px;color:var(--gray)}
.file-drop-hint{font-size:12px;color:var(--gray);margin-top:4px}
.file-name{color:var(--success);font-weight:700;font-size:14px;margin-bottom:4px}
.file-meta{font-size:12px;color:var(--gray)}

/* ALERTS */
.alert{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:14px;line-height:1.5}
.alert-err{background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b}
.alert-ok{background:#f0fdf4;border:1.5px solid #86efac;color:#166534}
.success-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:14px;padding:32px 28px;text-align:center}
.success-icon{font-size:44px;margin-bottom:12px}
.success-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--success);margin-bottom:8px}
.success-text{color:#166534;font-size:15px;margin-bottom:20px;line-height:1.6}

/* ADMIN */
.admin-wrap{max-width:400px;margin:80px auto;padding:0 24px}
.admin-card{background:#fff;border-radius:16px;padding:40px 36px;border:1.5px solid var(--lgray);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.admin-icon{font-size:36px;margin-bottom:10px;display:block;text-align:center}
.admin-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}
.admin-sub{font-size:14px;color:var(--gray);text-align:center;margin-bottom:28px}
.dash-wrap{max-width:1100px;margin:0 auto;padding:44px 24px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.dash-title{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700}
.dash-actions{display:flex;gap:10px;flex-wrap:wrap}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:12px;padding:20px 24px;border:1.5px solid var(--lgray)}
.stat-label{font-size:13px;color:var(--gray);margin-bottom:8px}
.stat-val{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--lgray);margin-bottom:28px}
.tab{padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;color:var(--gray);transition:all .15s;border:none;background:transparent;font-family:'Nunito',sans-serif}
.tab.active{color:var(--navy);background:#fff;border:2px solid var(--lgray);border-bottom:2px solid #fff;margin-bottom:-2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 14px;background:var(--navy);color:#fff;font-size:13px;font-weight:600}
th:first-child{border-radius:8px 0 0 0}
th:last-child{border-radius:0 8px 0 0}
td{padding:11px 14px;border-bottom:1px solid var(--lgray);vertical-align:middle}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:var(--orange);color:#fff}
.badge-gray{background:var(--lgray);color:var(--gray)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-item{background:var(--off);border-radius:8px;padding:12px 16px}
.detail-key{font-size:12px;color:var(--gray);margin-bottom:4px}
.detail-val{font-size:15px;font-weight:600}
.detail-note{background:var(--off);border-radius:8px;padding:12px 16px;margin-bottom:20px}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}
.empty-state{text-align:center;padding:60px 0;color:var(--gray)}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--navy)}
.empty-text{font-size:14px}

/* CONTENT UPLOAD (admin) */
.asset-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--lgray);gap:12px;flex-wrap:wrap}
.asset-row:last-child{border-bottom:none}
.asset-cat{font-weight:700;font-size:14px}
.asset-slots{display:flex;gap:10px;flex-wrap:wrap}
.asset-slot{display:flex;align-items:center;gap:8px;background:var(--off);border-radius:8px;padding:8px 14px;font-size:13px}
.asset-slot-ok{background:#f0fdf4;border:1px solid #86efac}
.asset-slot-miss{border:1.5px dashed var(--lgray)}

/* LOADING */
.loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.loader-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--navy)}
@keyframes spin{to{transform:rotate(360deg)}}
.page-loader{text-align:center;padding:80px 24px;color:var(--gray);font-size:15px}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-msg{background:var(--navy);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;max-width:300px}
.toast-msg.show{opacity:1;transform:translateY(0)}
.toast-msg.ok{background:#166534}
.toast-msg.err{background:#991b1b}

/* FOOTER */
footer{background:var(--navy);color:rgba(255,255,255,.45);text-align:center;padding:24px 16px;font-size:13px;margin-top:40px;word-break:break-word;overflow-wrap:break-word}
footer span{color:rgba(255,255,255,.25);font-size:12px;display:block;margin-top:5px}

/* RESPONSIVE */
@media(max-width:720px){
  .hero-title{font-size:38px}
  .two-col{grid-template-columns:1fr}
  .form-grid2{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
  .nav-links{display:none}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr}
  .photos-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <div class="nav-logo" onclick="navigate('home')">
    <div class="nav-logo-ball">🏀</div>
    <div class="nav-logo-text">
      Federazione Basket<br>
      <span class="nav-logo-sub">Sezione Giovani · San Marino</span>
    </div>
  </div>
  <div class="nav-links" id="nav-links"></div>
  <div class="hamburger" id="hamburger" onclick="toggleMobileMenu()">
    <span></span><span></span><span></span>
  </div>
  <div class="mobile-menu" id="mobile-menu"></div>
</nav>

<!-- APP -->
<div id="app"></div>

<!-- FOOTER -->
<footer>
  © 2025 Federazione Basket Sammarinese · Sezione Giovani
  <span>San Marino · Tutti i diritti riservati</span>
</footer>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// ⚙️  CONFIG — modifica questi valori
// ═══════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://wbuxofdvnwqrtcswstar.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidXhvZmR2bndxcnRjc3dzdGFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDg2NTIsImV4cCI6MjA5MTQ4NDY1Mn0.EHJ-naRbO-h2zFjGGqBdvhV7jIheofKihHmfWDOzuPA';

const CATEGORIES = [
  { id:'centro-estivo', name:'Centro Estivo',  icon:'☀️', desc:'Attività estive per i più piccoli' },
  { id:'categoria-2',   name:'Incontri',       icon:'🏀', desc:'Descrizione da aggiornare' },
  { id:'categoria-3',   name:'Nazionale',      icon:'⭐', desc:'Descrizione da aggiornare' },
  { id:'categoria-4',   name:'Sport Speciali', icon:'🌟', desc:'Descrizione da aggiornare' },
  { id:'categoria-5',   name:'Minigiochi',     icon:'🏆', desc:'Descrizione da aggiornare' },
  { id:'categoria-6',   name:'Contattaci',     icon:'📋', desc:'Descrizione da aggiornare' },
];
// ═══════════════════════════════════════════════════════

const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, storageKey: 'fsp-auth', storage: window.localStorage }
});

// ── STATE ──
const state = {
  page: 'home',
  catId: null,
  user: null,
  submissions: [],
  selected: null,
  assets: {},       // {catId: {flyer_path, flyer_url, template_path, template_name}}
  adminTab: 'iscrizioni',
  formSuccess: false,
  loading: false,
};

function set(upd) { Object.assign(state, upd); render(); }

// ── HELPERS ──
function catById(id) { return CATEGORIES.find(c => c.id === id); }
function fmt(iso) { return new Date(iso).toLocaleString('it-IT'); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('it-IT'); }
function fmtSize(b) { return b > 1048576 ? (b/1048576).toFixed(1)+' MB' : Math.round(b/1024)+' KB'; }

function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, 3200);
}

// ── NAVIGATION ──
function navigate(page, catId = null) {
  set({ page, catId, formSuccess: false, selected: null });
  window.scrollTo(0, 0);
}

// ── NAV LINKS ──
function renderNav() {
  const wrap = document.getElementById('nav-links');
  const links = CATEGORIES.map(c =>
    `<span class="nav-link${state.catId===c.id?' active':''}" onclick="navigate('category','${c.id}')">${c.name}</span>`
  ).join('');
  wrap.innerHTML = links;
  const mob = document.getElementById('mobile-menu');
  if (mob) mob.innerHTML = CATEGORIES.map(c =>
    `<span class="nav-link${state.catId===c.id?' active':''}" onclick="navigate('category','${c.id}');toggleMobileMenu()">${c.name}</span>`
  ).join('');
}

function toggleMobileMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobile-menu').classList.toggle('open');
}

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function renderHome() {
  return `
  <div class="hero">
    <div class="hero-bg1"></div><div class="hero-bg2"></div>
    <div class="hero-inner">
      <div class="hero-kicker">Federazione Basket · San Marino</div>
      <h1 class="hero-title">Basket<br>per i Più Piccoli</h1>
      <p class="hero-desc">Esplora tutte le attività dedicate ai giovani atleti. Clicca su una categoria per trovare il volantino e il modulo di iscrizione.</p>
      <div class="photos-row">
        <div class="photo-slot">
          ${state.assets['__hero1']?.flyer_url
            ? `<img src="${state.assets['__hero1'].flyer_url}" alt="foto 1">`
            : `<div class="photo-ph">📸<br>Foto 1<br><small>Carica dall'admin</small></div>`}
        </div>
        <div class="photo-slot">
          ${state.assets['__hero2']?.flyer_url
            ? `<img src="${state.assets['__hero2'].flyer_url}" alt="foto 2">`
            : `<div class="photo-ph">📸<br>Foto 2<br><small>Carica dall'admin</small></div>`}
        </div>
      </div>
    </div>
  </div>
  <div class="section">
    <h2 class="section-title">Le nostre attività</h2>
    <div class="section-line"></div>
    <div class="cat-grid">
      ${CATEGORIES.map(c => `
        <div class="cat-card" onclick="navigate('category','${c.id}')">
          <div class="cat-icon">${c.icon}</div>
          <div class="cat-name">${c.name}</div>
          <div class="cat-desc">${c.desc}</div>
          <div class="cat-arrow">→ Scopri di più</div>
        </div>`).join('')}
    </div>

// FORM (public)

const _pendingFiles = { modulo: null, documento: null, certificato: null };
let _pendingAssetMeta = null; // {catId, kind}

function handleMultiSelect(e, key) {
  const f = e.target.files[0];
  if (f) { _pendingFiles[key] = f; updateMultiLabel(key, f); updateFileSummary(); }
}
function handleMultiDrop(e, key) {
  e.preventDefault();
  document.getElementById('file-drop-' + key)?.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) { _pendingFiles[key] = f; updateMultiLabel(key, f); updateFileSummary(); }
}
function truncName(name, max) {
  if (name.length <= max) return name;
  const dot = name.lastIndexOf('.');
  const ext = dot > 0 ? name.slice(dot) : '';
  const base = dot > 0 ? name.slice(0, dot) : name;
  const keep = max - ext.length - 3;
  return keep > 0 ? base.slice(0, keep) + '...' + ext : name.slice(0, max - 3) + '...';
}
function updateMultiLabel(key, f) {
  const el = document.getElementById('file-label-' + key);
  if (el) el.innerHTML = `<div class="file-name">✅ ${truncName(f.name, 25)}</div><div class="file-meta">${fmtSize(f.size)} · Clicca per cambiare</div>`;
}
function updateFileSummary() {
  const count = Object.values(_pendingFiles).filter(Boolean).length;
  const el = document.getElementById('file-summary');
  if (el) el.innerHTML = count > 0 ? `📎 Hai allegato <strong>${count}</strong> file su <strong>3</strong>` : '';
}

async function submitForm(catId) {
  const errEl = document.getElementById('form-err');
  const keys = ['modulo','documento','certificato'];

  for (const key of keys) {
    if (_pendingFiles[key] && _pendingFiles[key].size > 5*1024*1024) {
      errEl.innerHTML = `<div class="alert alert-err">⚠ Il file "${_pendingFiles[key].name}" è troppo grande (max 5 MB).</div>`;
      return;
    }
  }
  errEl.innerHTML = '';
  const btn = document.getElementById('submit-btn');
  if (btn) btn.innerHTML = '<span class="loader"></span> Invio in corso...';
  if (btn) btn.disabled = true;

  try {
    const ts = Date.now();
    const paths = {};
    const names = {};
    console.log('[submitForm] START catId=', catId, 'pendingFiles=', {modulo:!!_pendingFiles.modulo, documento:!!_pendingFiles.documento, certificato:!!_pendingFiles.certificato});
    for (const key of keys) {
      const f = _pendingFiles[key];
      if (f) {
        const ext = f.name.split('.').pop();
        const path = `${catId}/${ts}_${key}.${ext}`;
        console.log(`[submitForm] uploading ${key}: path=${path}, size=${f.size}, type=${f.type}`);
        const { error: upErr } = await db.storage.from('submission-files').upload(path, f);
        if (upErr) { console.error(`[submitForm] UPLOAD ERROR for ${key}:`, upErr); throw upErr; }
        console.log(`[submitForm] uploaded ${key} OK`);
        paths[key] = path;
        names[key] = f.name;
      }
    }
    const hasFiles = Object.keys(paths).length > 0;
    const insertData = {
      category_id: catId,
      category_name: catById(catId)?.name || catId,
      file_path: hasFiles ? JSON.stringify(paths) : null,
      file_name: hasFiles ? JSON.stringify(names) : null,
    };
    console.log('[submitForm] INSERT data:', JSON.stringify(insertData));
    const { error, data: insertResult } = await db.from('submissions').insert(insertData).select();
    console.log('[submitForm] INSERT result:', insertResult, 'error:', error);
    if (error) throw error;
    _pendingFiles.modulo = null; _pendingFiles.documento = null; _pendingFiles.certificato = null;
    set({ formSuccess: true });
    toast('Iscrizione inviata con successo!', 'ok');
  } catch (e) {
    if (btn) { btn.innerHTML = '📤 Invia iscrizione'; btn.disabled = false; }
    errEl.innerHTML = `<div class="alert alert-err">⚠ Errore durante l'invio. Riprova tra qualche istante.</div>`;
    console.error('[submitForm] CATCH error:', e);
    console.error('[submitForm] error message:', e?.message);
    console.error('[submitForm] error details:', e?.details);
    console.error('[submitForm] error hint:', e?.hint);
    console.error('[submitForm] error code:', e?.code);
  }
}

async function doLogin() {
  const email = document.getElementById('admin-email')?.value.trim();
  const pwd   = document.getElementById('admin-pwd')?.value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-err');
  if (!email || !pwd) { errEl.innerHTML = `<div class="alert alert-err">Inserisci email e password.</div>`; return; }
  if (btn) { btn.innerHTML = '<span class="loader"></span>'; btn.disabled = true; }
  const { data, error } = await db.auth.signInWithPassword({ email, password: pwd, options: { persistSession: true } });
  if (error) {
    if (btn) { btn.innerHTML = 'Accedi'; btn.disabled = false; }
    errEl.innerHTML = `<div class="alert alert-err">⚠ Credenziali non valide. Riprova.</div>`;
  } else {
    state.user = data.user;
    await refreshSubs();
    await loadAssets();
    render();
    toast('Accesso effettuato', 'ok');
  }
}

async function doLogout() {
  await db.auth.signOut();
  set({ user: null, submissions: [], selected: null });

}

// ══════════════════════════════════════════════
// ADMIN — SUBMISSIONS
// ══════════════════════════════════════════════
async function refreshSubs() {
  const { data, error } = await db.from('submissions').select('*').order('created_at', { ascending: false });
  if (!error) state.submissions = data || [];
  render();
}

function parseFilePaths(val) {
  if (!val) return null;
  try { const p = JSON.parse(val); return (typeof p === 'object' && p !== null) ? p : val; }
  catch { return val; }
}

async function downloadSubSingle(subId) {
  const s = state.submissions.find(x => x.id === subId);
  if (!s?.file_path) return;
  const fp = parseFilePaths(s.file_path);
  const fn = parseFilePaths(s.file_name);
  const path = typeof fp === 'string' ? fp : Object.values(fp)[0];
  const name = typeof fn === 'string' ? fn : Object.values(fn)[0];
  const { data, error } = await db.storage.from('submission-files').createSignedUrl(path, 120);
  if (error) { toast('Errore nel download', 'err'); return; }
  const a = document.createElement('a'); a.href = data.signedUrl; a.download = name || 'allegato'; a.click();
}

async function downloadSubByKey(subId, key) {
  const s = state.submissions.find(x => x.id === subId);
  if (!s?.file_path) return;
  const fp = parseFilePaths(s.file_path);
  const fn = parseFilePaths(s.file_name);
  const path = typeof fp === 'object' ? fp[key] : fp;
  const name = typeof fn === 'object' ? fn[key] : fn;
  if (!path) return;
  const { data, error } = await db.storage.from('submission-files').createSignedUrl(path, 120);
  if (error) { toast('Errore nel download', 'err'); return; }
  const a = document.createElement('a'); a.href = data.signedUrl; a.download = name || 'allegato'; a.click();
}

async function deleteSub(subId) {
  if (!confirm('Eliminare questa iscrizione? L\'operazione non è reversibile.')) return;
  const s = state.submissions.find(x => x.id === subId);
  const fp = parseFilePaths(s?.file_path);
  const filesToRemove = typeof fp === 'object' && fp ? Object.values(fp) : (fp ? [fp] : []);
  if (filesToRemove.length) {
    await db.storage.from('submission-files').remove(filesToRemove);
  }
  const { error } = await db.from('submissions').delete().eq('id', subId);
  if (error) { toast('Errore eliminazione', 'err'); return; }
  state.submissions = state.submissions.filter(x => x.id !== subId);
  set({ selected: null });
  toast('Iscrizione eliminata');
}

// ══════════════════════════════════════════════
// ADMIN — ASSET MANAGEMENT
// ══════════════════════════════════════════════
async function loadAssets() {
  const { data } = await db.from('category_assets').select('*');
  if (data) {
    state.assets = {};
    for (const row of data) {
      state.assets[row.category_id] = row;
      if (row.flyer_path) {
        const { data: urlData } = db.storage.from('category-assets').getPublicUrl(row.flyer_path);
        state.assets[row.category_id].flyer_url = urlData?.publicUrl;
      }
    }
  }
}

function triggerAsset(catId, kind) {
  _pendingAssetMeta = { catId, kind };
  const inp = document.getElementById('asset-inp');
  if (kind === 'flyer') inp.accept = 'image/*,.pdf';
  else inp.accept = '.docx,.doc';
  inp.value = '';
  inp.click();
}

async function handleAssetUpload(e) {
  const file = e.target.files[0];
  if (!file || !_pendingAssetMeta) return;
  const { catId, kind } = _pendingAssetMeta;

  if (file.size > 10*1024*1024) { toast('File troppo grande (max 10 MB)', 'err'); return; }

  const ext = file.name.split('.').pop();
  const path = `${catId}/${kind}.${ext}`;

  // Remove old file if exists
  const old = state.assets[catId];
  if (old) {
    const oldPath = kind === 'flyer' ? old.flyer_path : old.template_path;
    if (oldPath) await db.storage.from('category-assets').remove([oldPath]);
  }

  const { error: upErr } = await db.storage.from('category-assets').upload(path, file, { upsert: true });
  if (upErr) { toast('Errore upload: ' + upErr.message, 'err'); return; }

  const update = kind === 'flyer'
    ? { category_id: catId, flyer_path: path, flyer_name: file.name }
    : { category_id: catId, template_path: path, template_name: file.name };

  const { error } = await db.from('category_assets').upsert(update, { onConflict: 'category_id' });
  if (error) { toast('Errore salvataggio', 'err'); return; }

  toast(`${kind === 'flyer' ? 'Volantino' : 'Modulo'} caricato!`, 'ok');
  await loadAssets();
  render();
}

async function downloadTemplate(catId) {
  const a = state.assets[catId];
  if (!a?.template_path) return;
  const { data, error } = await db.storage.from('category-assets').createSignedUrl(a.template_path, 60);
  if (error) { toast('Errore nel download', 'err'); return; }
  const link = document.createElement('a');
  link.href = data.signedUrl;
  link.download = a.template_name || 'modulo.docx';
  link.click();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  const { data: { session } } = await db.auth.getSession();
  state.user = session?.user || null;
  await loadAssets();
  if (state.user) await refreshSubs();
  if (window.location.hash === '#admin') state.page = 'admin';
  render();
}

window.addEventListener('hashchange', () => {
  if (window.location.hash === '#admin') { state.page = 'admin'; render(); }
});

// ── NAVBAR HIDE/SHOW ON SCROLL ──
(function(){
  const nav = document.getElementById('navbar');
  let lastY = window.scrollY;
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y > lastY && y > 60) nav.classList.add('nav-hidden');
    else nav.classList.remove('nav-hidden');
    lastY = y;
  });
})();

init();
</script>
